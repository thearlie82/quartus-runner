name: Build Quartus Runner Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      quartus_tag:
        description: "Quartus base image tag (e.g. agilex3, agilex5, agilex7)"
        required: false
        default: "agilex3"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/quartus-runner

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        quartus_tag: [agilex3]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.quartus_tag }}
            type=sha,prefix=${{ matrix.quartus_tag }}-

      - name: Build and push (Ubuntu 22.04 base with Quartus 25.3.1-patch1.02)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ubuntu22
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            QUARTUS_TAG=${{ matrix.quartus_tag }}
          no-cache: true

      - name: Verify image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tags }}
        run: |
          FIRST_TAG=$(echo "$IMAGE_TAG" | head -1)
          echo "Testing image: $FIRST_TAG"
          docker run --rm "$FIRST_TAG" ldd --version 2>&1 | head -1
          docker run --rm "$FIRST_TAG" /opt/altera/quartus/bin/quartus_sh --version
