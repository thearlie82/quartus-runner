name: Test Quartus Runner Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/thearlie82/quartus-runner:agilex3
  STOCK: alterafpga/quartus-pro:25.3.1-patch1.02-agilex3

jobs:
  test:
    name: Image Validation & Synthesis
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull "$IMAGE"
          docker pull "$STOCK"

      - name: Validate our image
        run: |
          docker run --rm "$IMAGE" bash -c '
            head -1 /etc/os-release
            ldd --version 2>&1 | head -1
            /opt/altera/quartus/bin/quartus_sh --version 2>&1 | head -3
            command -v git && command -v pwsh && command -v python3 && echo "All tools present"
          '

      - name: Create test project
        run: |
          mkdir -p /tmp/tp
          echo 'module top(input wire c,input wire d,output reg q); always @(posedge c) q<=d; endmodule' > /tmp/tp/top.v
          echo 'QUARTUS_VERSION="25.3"' > /tmp/tp/t.qpf
          echo 'PROJECT_REVISION="t"' >> /tmp/tp/t.qpf
          printf 'set_global_assignment -name FAMILY "Agilex 3"\nset_global_assignment -name DEVICE A3CW135BM16AE6S\nset_global_assignment -name TOP_LEVEL_ENTITY top\nset_global_assignment -name VERILOG_FILE top.v\n' > /tmp/tp/t.qsf
          chmod 777 /tmp/tp

      - name: "Test 1: Stock image with --net=host (official docs requirement)"
        run: |
          docker run --rm --net=host \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$STOCK" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -5
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 2: Custom image with --net=host"
        run: |
          docker run --rm --net=host \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$IMAGE" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -5
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 3: Custom image WITHOUT libudev (remove it)"
        run: |
          # Create a modified container without libudev
          docker run --name no-libudev "$IMAGE" bash -c '
            rm -f /usr/lib/x86_64-linux-gnu/libudev.so.1 /usr/lib/x86_64-linux-gnu/libudev.so.1.7.2 /lib/x86_64-linux-gnu/libudev.so.1 /lib/x86_64-linux-gnu/libudev.so.1.7.2 2>/dev/null || true
            echo "libudev removed"
          '
          docker commit no-libudev test-no-libudev
          docker rm no-libudev
          docker run --rm \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            test-no-libudev bash -c '
              cd /tmp/tp
              ls -la /lib/x86_64-linux-gnu/libudev* 2>/dev/null || echo "libudev: gone"
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -5
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 4: Stock image direct from Altera (as-is, no flags)"
        run: |
          docker run --rm \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$STOCK" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -5
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 5: Stock image with --privileged"
        run: |
          docker run --rm --privileged \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$STOCK" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -5
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 6: Custom image with --net=host (fix permissions)"
        run: |
          docker run --rm --net=host \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$IMAGE" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -20
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"

      - name: "Test 7: Stock image with --net=host (full output)"
        run: |
          docker run --rm --net=host \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            -v /tmp/tp:/tmp/tp \
            "$STOCK" bash -c '
              cd /tmp/tp
              /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | tail -20
              echo "Exit: ${PIPESTATUS[0]}"
            ' || true
          echo "Step completed"
