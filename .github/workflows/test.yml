name: Test Quartus Runner Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/thearlie82/quartus-runner:agilex3

jobs:
  test:
    name: Image Validation & Synthesis
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE"

      - name: Validate OS and glibc
        run: |
          docker run --rm "$IMAGE" bash -c '
            head -1 /etc/os-release
            ldd --version 2>&1 | head -1
            ldd --version 2>&1 | grep -q "2\.35" && echo "PASS: glibc 2.35" || (echo "FAIL: wrong glibc" && exit 1)
          '

      - name: Validate Quartus version
        run: docker run --rm "$IMAGE" /opt/altera/quartus/bin/quartus_sh --version

      - name: Validate required tools
        run: |
          docker run --rm "$IMAGE" bash -c '
            command -v git && command -v pwsh && command -v python3 && echo "All tools present"
          '

      - name: Diagnose Quartus library linkage
        run: |
          docker run --rm \
            -e HOME=/tmp \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            "$IMAGE" bash -c '
              echo "=== quartus_syn wrapper script ==="
              head -50 /opt/altera/quartus/bin/quartus_syn
              echo "=== Bundled glibc? ==="
              find /opt/altera -name "libc.so*" -o -name "libc-*.so" 2>/dev/null
              echo "=== LD_LIBRARY_PATH from wrapper ==="
              # Source the wrapper env and show what gets set
              grep -i "LD_LIBRARY_PATH" /opt/altera/quartus/bin/quartus_syn 2>/dev/null || true
              grep -ri "LD_LIBRARY_PATH" /opt/altera/quartus/linux64/ 2>/dev/null | head -5 || true
              echo "=== ldd on quartus_syn binary ==="
              # Find the actual binary (not wrapper)
              SYNBIN=$(find /opt/altera/quartus -name "quartus_syn" -type f ! -path "*/bin/*" 2>/dev/null | head -1)
              if [ -z "$SYNBIN" ]; then
                SYNBIN=$(readlink -f /opt/altera/quartus/bin/quartus_syn 2>/dev/null)
              fi
              echo "Binary: $SYNBIN"
              file "$SYNBIN" 2>/dev/null
              ldd "$SYNBIN" 2>/dev/null | grep -i libc || true
              echo "=== /opt/altera/quartus/linux64/lib* libc ==="
              ls /opt/altera/quartus/linux64/lib*/libc* 2>/dev/null || echo "No bundled libc in linux64/lib"
            '

      - name: Test synthesis (no crash = pass)
        run: |
          # License server is not reachable from github.com runners, so synthesis
          # will fail with a license error. That's OK - we're testing that Quartus
          # doesn't crash (SIGABRT/exit 134) due to glibc incompatibility.
          # Exit codes: 0=success, 2=license/compile error (OK), 134=SIGABRT (FAIL)
          docker run --rm \
            -e HOME=/tmp \
            -e LM_LICENSE_FILE=1717@localhost \
            -e QUARTUS_ROOTDIR=/opt/altera/quartus \
            -e QUARTUS_DISABLE_DDM=1 \
            --shm-size=1g \
            "$IMAGE" bash -c '
              mkdir -p /tmp/tp && cd /tmp/tp

              echo "module top(input wire c,input wire d,output reg q); always @(posedge c) q<=d; endmodule" > top.v

              echo "QUARTUS_VERSION=\"25.3\"" > t.qpf
              echo "PROJECT_REVISION=\"t\"" >> t.qpf

              printf "set_global_assignment -name FAMILY \"Agilex 3\"\n" > t.qsf
              printf "set_global_assignment -name DEVICE A3CW135BM16AE6S\n" >> t.qsf
              printf "set_global_assignment -name TOP_LEVEL_ENTITY top\n" >> t.qsf
              printf "set_global_assignment -name VERILOG_FILE top.v\n" >> t.qsf

              echo "=== Running synthesis ==="
              LD_DEBUG=libs /opt/altera/quartus/bin/quartus_syn --read_settings_files=on --write_settings_files=off t -c t 2>&1 | grep -E "libc|realloc|calling init|SIGABRT" | tail -20
              SYNTH_EXIT=${PIPESTATUS[0]}
              echo "Synthesis exit code: $SYNTH_EXIT"

              if [ $SYNTH_EXIT -eq 134 ] || [ $SYNTH_EXIT -gt 128 ]; then
                echo "FAIL: Quartus crashed with signal $(( SYNTH_EXIT - 128 ))"
                exit 1
              elif [ $SYNTH_EXIT -eq 0 ]; then
                echo "PASS: Synthesis completed successfully"
              else
                echo "PASS: Quartus ran without crashing (exit $SYNTH_EXIT likely license error)"
              fi
            '
